# gitleaks secret scan -- GitHub Actions enforcement tier (Vikunja #1264, ADR-062).
#
# CANONICAL SOURCE: tools/gitleaks/github-workflow.yml
# Installed into each GitHub-hosted repo as .github/workflows/gitleaks.yml.
# GitHub-hosted runners do not carry gitleaks, so this workflow installs the
# pinned release binary before scanning. Mirrors forgejo-workflow.yml: same
# scan command, same .gitleaksbaseline.json auto-detection.
name: gitleaks
on: [push]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          mkdir -p "$HOME/bin"
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C "$HOME/bin" gitleaks
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: gitleaks secret scan
        run: |
          if [ -f .gitleaksbaseline.json ]; then
            gitleaks dir . --redact --no-banner --baseline-path .gitleaksbaseline.json
          else
            gitleaks dir . --redact --no-banner
          fi
