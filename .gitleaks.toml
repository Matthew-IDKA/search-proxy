# gitleaks configuration -- homelab canonical ruleset
#
# CANONICAL SOURCE. tools/gitleaks/sync-gitleaks-config.py distributes this
# file byte-identical to every in-scope repo as `.gitleaks.toml`. Edit ONLY
# this canonical -- a per-repo `.gitleaks.toml` edit is overwritten by the
# next sync and flagged by the weekly drift probe. See ADR-062 and
# secrets_policy.md section 3.3.
#
# Extends the gitleaks built-in ruleset with homelab-specific credential
# shapes. Test:  gitleaks detect --config .gitleaks.toml --source .

[extend]
useDefault = true

[[rules]]
id = "paperless-ngx-token"
description = "Paperless-ngx API token (40-char hex after 'Authorization: Token')"
regex = '''(?i)authorization:\s*token\s+[a-f0-9]{40}'''
tags = ["api", "paperless", "homelab"]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key"
regex = '''sk-ant-[A-Za-z0-9_-]{50,}'''
tags = ["api", "anthropic"]

[[rules]]
id = "vikunja-api-token"
description = "Vikunja API token (tk_ prefix). Verify exact shape against vikunja-config.md."
regex = '''tk_[A-Za-z0-9]{40,}'''
tags = ["api", "vikunja", "homelab"]

[[rules]]
id = "bitwarden-client-secret"
description = "Bitwarden CLI client secret in env assignment"
regex = '''BW_CLIENTSECRET\s*=\s*\S{20,}'''
tags = ["api", "bitwarden"]

[[rules]]
id = "bearer-token-generic"
description = "Bearer auth header with opaque token"
regex = '''(?i)authorization:\s*bearer\s+[A-Za-z0-9_.\-]{30,}'''
tags = ["api", "generic"]

[[rules]]
id = "curl-basic-auth"
description = "curl -u/--user with a literal basic-auth password. Variable refs ($VAR) are not flagged. v1 regex -- tune against srm-api during rollout."
regex = '''(?i)\bcurl\b[^\n]*?-(?:u|-user)[ =]+["']?[A-Za-z0-9._%+-]+:[^\s"'$]{8,}'''
tags = ["api", "basic-auth", "generic"]

# Surface 2 -- documentation drift (secrets_policy.md 3.4). Scoped to doc/manifest
# paths: fail on a literal value assigned to a <SERVICE>_<KIND> var. Docs must name
# vars and reference them with $-syntax, never embed the value. References that pass:
# $VAR, ${VAR}, {{ var }} (Jinja/template), and <PLACEHOLDER> markers (global
# CLAUDE.md placeholder convention). KIND set is the secrets_policy.md 2.5 canonical
# {TOKEN, PASSWORD, API_KEY, JWT} -- the rule enforces that set; rejected suffixes
# (PASS, SECRET, bare KEY) are out of scope here by design.
[[rules]]
id = "doc-literal-secret-assignment"
description = "Literal value assigned to a <SERVICE>_<KIND> var in docs/manifest (secrets_policy.md 3.4 Surface 2). $VAR / ${..} / {{..}} / <PLACEHOLDER> refs pass."
regex = '''\b[A-Z][A-Z0-9_]*_(?:TOKEN|PASSWORD|API_KEY|JWT)\s*[:=]\s*[^\s$\{<]'''
path = '''(^|/)(docs|manifest)/|(^|/)(auth-reference|sops-conventions)\.md$'''
tags = ["docs", "drift", "homelab"]

# --- Allowlist ---------------------------------------------------------------
# Entries here suppress matches. Prefer line-level regex over path-wide skips.
#
# Surface 5 -- archive directories (secrets_policy.md 3.4). NEVER add a path
# allowlist for *archive*/ directories. Archived files are scanned by the same
# default + custom rules as live files; that coverage is the cleanup-before-archive
# guard. A path skip here would silently let secrets enter tracked content via
# `git mv X archive/X`. Hits under archive paths must be classified
# (test / expired / real) and redacted, rotated, or blocked -- not allowlisted.

[[allowlists]]
description = "False positives from CLI flags, documentation references, and known public artifacts."
regexTarget = "line"
regexes = [
  # CLI flag literally named --must-change-password (not a credential)
  '''--must-change-password''',
  # Placeholder variable references in docs/examples
  '''\$PAPERLESS_TOKEN''',
  '''\$VIKUNJA_TOKEN''',
  '''\$ANTHROPIC_API_KEY''',
]

# A documentation-template private key has an angle-bracket placeholder body
# (e.g. "<content of ~/.ssh/...>") instead of real key material. Suppress those
# by matching the placeholder against the matched block. A real key -- commented
# or not, in any file -- has a base64 body and stays flagged.
# Verified 2026-05-15 (Vikunja #982).
[[allowlists]]
description = "Documentation-template private keys -- angle-bracket placeholder body, not real key material"
regexTarget = "match"
regexes = ['''<content of [^>]*>''']

# SOPS-encrypted files are ciphertext by construction; entropy and key rules
# fire on the encrypted body, not on plaintext secrets. Skip them wholesale.
# Mandated by secrets_policy.md section 3.3.
[[allowlists]]
description = "SOPS-encrypted files -- ciphertext, not plaintext secrets (secrets_policy.md 3.3)"
paths = ['''\.sops(\.|$)''']
